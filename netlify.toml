<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — The Inner Workshop</title>
  <meta name="description" content="Meet the person behind The Inner Workshop — qualified, experienced and committed to helping you create lasting change." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 4rem;
      align-items: start;
      margin-bottom: 5rem;
    }
    @media (max-width: 768px) { .about-grid { grid-template-columns: 1fr; } }

    .about-photo {
      position: relative;
    }
    .about-photo-frame {
      width: 100%;
      aspect-ratio: 3/4;
      background: linear-gradient(135deg, var(--circle), rgba(184,212,192,0.3));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .photo-placeholder {
      text-align: center;
      color: var(--teal);
      padding: 2rem;
    }
    .photo-placeholder .icon { font-size: 4rem; margin-bottom: 1rem; }
    .photo-placeholder p { font-size: 0.85rem; color: var(--text-mid); }

    .about-badge {
      position: absolute;
      bottom: -1rem;
      right: -1rem;
      background: var(--teal);
      color: var(--white);
      padding: 1rem 1.5rem;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 8px 24px var(--shadow);
    }
    .about-badge .num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      line-height: 1;
      display: block;
    }
    .about-badge span { font-size: 0.75rem; letter-spacing: 0.05em; }

    .quals-list {
      list-style: none;
      margin-top: 1.5rem;
    }
    .quals-list li {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--circle);
      font-size: 0.95rem;
      color: var(--text-mid);
    }
    .quals-list li:last-child { border-bottom: none; }
    .quals-list .tick {
      color: var(--teal);
      font-size: 1rem;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .values-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .value-card {
      padding: 1.8rem;
      border: 1px solid var(--circle);
      border-radius: 16px;
      background: var(--white);
    }
    .value-card .val-icon { font-size: 1.8rem; margin-bottom: 0.75rem; }
    .value-card h3 { font-size: 1.2rem; margin-bottom: 0.4rem; }
  </style>
</head>
<body>

